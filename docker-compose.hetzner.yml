services:

  # ── Schimmilab Static Frontend (Nginx) ──────────────────────────────────────
  schimmilab:
    image: ${IMAGE:-ghcr.io/schimmilab/schimmilab_webpage:latest}
    container_name: schimmilab
    restart: unless-stopped
    networks:
      - web
    labels:
      - "traefik.enable=true"
      # HTTP → HTTPS Redirect
      - "traefik.http.routers.schimmilab.rule=Host(`schimmilab.de`) || Host(`www.schimmilab.de`)"
      - "traefik.http.routers.schimmilab.entrypoints=web"
      - "traefik.http.routers.schimmilab.middlewares=redirect-to-https@docker"
      # HTTPS mit Let's Encrypt
      - "traefik.http.routers.schimmilab-secure.rule=Host(`schimmilab.de`) || Host(`www.schimmilab.de`)"
      - "traefik.http.routers.schimmilab-secure.entrypoints=websecure"
      - "traefik.http.routers.schimmilab-secure.tls.certresolver=letsencrypt"
      - "traefik.http.services.schimmilab.loadbalancer.server.port=80"

networks:
  web:
    external: true
