Der Workflow zeigt Status des aktuellen Deployments. Das `deploy.yml` muss manuell gepusht werden, um das automatisierte Deployment abzuschließen.

Ich kann den Status leider nicht direkt einsehen – der Token hat keinen Actions-Lesezugriff auf die Org. Schau kurz selbst unter github.com/Schimmilab/schimmilab_webpage/actions – was siehst du? Läuft er noch, oder ist er schon grün/rot? Falls er fehlschlägt, schick mir einfach die Fehlermeldung und ich schaue drüber.
