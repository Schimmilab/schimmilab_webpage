name: Deploy to Hetzner

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Force lowercase for GHCR compatibility (Docker requires all-lowercase image names)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Build & Push Docker Image ──────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.lowercase.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Convert repository name to lowercase (GHCR requirement)
      - id: lowercase
        run: |
          IMAGE=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.lowercase.outputs.image }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy auf Hetzner ─────────────────────────────────────────────────────
  deploy:
    name: Deploy auf Hetzner
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Auf Hetzner deployen
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 2222
          script: |
            set -e
            echo "=== Deployment gestartet: $(date) ==="

            # Image name in lowercase (Docker/GHCR requirement)
            IMAGE="ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]'):latest"

            # Bei GitHub Container Registry anmelden
            echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Neuestes Image pullen
            docker pull $IMAGE

            # Container neu starten
            cd /home/schimmi
            IMAGE=$IMAGE docker compose -f docker-compose.hetzner.yml up -d schimmilab --remove-orphans

            # Altes Image aufräumen
            docker image prune -f

            echo "=== Deployment abgeschlossen: $(date) ==="

            # Health Check
            sleep 5
            if docker ps | grep -q "schimmilab"; then
              echo "Container laeuft erfolgreich"
            else
              echo "FEHLER: Container nicht gestartet!"
              docker logs schimmilab --tail 50
              exit 1
            fi
